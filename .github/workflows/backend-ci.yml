name: Backend CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: tms_db_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: ${{ hashFiles('backend/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: ${{ hashFiles('backend/package-lock.json') != '' && 'backend/package-lock.json' || '' }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        shell: bash

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -P3306 -uroot -prootpassword && break
            sleep 2
          done

      - name: Run tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: tms_db_test
          DB_USER: root
          DB_PASSWORD: rootpassword
          JWT_SECRET: ci_test_secret
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_SECRET: ci_test_refresh_secret
          JWT_REFRESH_EXPIRES_IN: 1d
          EMAIL_HOST: smtp.mailtrap.io
          EMAIL_PORT: 587
          EMAIL_USER: test
          EMAIL_PASS: test
          EMAIL_FROM: noreply@tms.com
          FRONTEND_URL: http://localhost:3000
        run: npm test
