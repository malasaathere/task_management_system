<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - TaskMaster Pro</title>
    <meta name="description" content="Access your TaskMaster Pro workspace to manage your projects, track tasks, and collaborate with your team.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="login-container">
        <section class="login-card">
            <!-- Logo Area -->
            <div class="logo-area" aria-label="TaskMaster Pro Logo">
                <div class="logo-icon" aria-hidden="true">
                    <svg width="36" height="36" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="12" fill="url(#logo-gradient)"/>
                        <path d="M12 20L17 25L28 14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="logo-gradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#3B82F6"/>
                                <stop offset="1" stop-color="#8B5CF6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">TaskMaster <span class="logo-accent">Pro</span></span>
            </div>

            <!-- Welcome Header -->
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Sign in to continue managing your projects and tasks</p>
            </div>

            <!-- Global Message Alert Placeholder -->
            <div id="auth-alert" class="alert hidden" role="alert"></div>

            <!-- Login Form -->
            <form id="login-form" novalidate>
                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">
                            <!-- SVG Envelope Icon -->
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="20" height="16" x="2" y="4" rx="2"/>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                            </svg>
                        </span>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="name@company.com" 
                            required
                            aria-required="true"
                            autocomplete="email"
                        >
                    </div>
                    <span class="error-message" id="email-error" aria-live="polite"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">
                            <!-- SVG Lock Icon -->
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••" 
                            required
                            aria-required="true"
                            autocomplete="current-password"
                        >
                        <!-- Show/Hide Password Toggle Button -->
                        <button type="button" id="password-toggle" class="password-toggle" aria-label="Show password">
                            <!-- Eye icon -->
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <!-- Eye-off icon (hidden by default) -->
                            <svg class="eye-off-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                                <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                                <line x1="2" x2="22" y1="2" y2="22"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-message" id="password-error" aria-live="polite"></span>
                </div>

                <!-- Utilities: Remember Me & Forgot Password -->
                <div class="form-utilities">
                    <label class="remember-me" for="remember-me">
                        <input type="checkbox" id="remember-me" name="remember-me">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" id="forgot-password-link">Forgot password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="submit-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-spinner"></span>
                </button>
            </form>
        </section>
    </main>

    <!-- Custom Authentication Logic -->
    <script src="js/auth.js"></script>
</body>
</html>
